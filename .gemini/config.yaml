# Gemini Code Assist configuration for ha-mcp (Kanary fork)

# Disable persistent memory for clean canary baseline
memory_config:
  disabled: true

# Code review configuration
code_review:
  # Show all findings (LOW and above) for canary completeness
  comment_severity_threshold: LOW

  # Limit comments to avoid overwhelming contributors
  max_review_comments: 15

  # Enable automated PR features
  pull_request_opened:
    summary: true          # Provide PR summary
    code_review: true      # Perform code review
    include_drafts: true   # Review draft PRs too

# No playful elements in professional project
have_fun: false

